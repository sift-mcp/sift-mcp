version: 2

project_name: sift-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: sift
    main: ./cmd/server
    binary: sift
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: sift
    builds:
      - sift
    name_template: "sift_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: sift-mcp
    name: sift-mcp
